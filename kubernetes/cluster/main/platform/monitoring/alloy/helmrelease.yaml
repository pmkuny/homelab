apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana-alloy
  namespace: montioring
spec:
  interval: 30m

  targetNamespace: monitoring
  chart:
    spec:
      chart: grafana/alloy
      version: "1.11.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  valuesFrom:
    name: alloy-cm
    valuesKey: alloy
