apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: flux-system
spec:
  interval: 30m

  # Installing the longhorn chart in the longhorn-system namespace, referencing the HelmRepository to pull the chart from
  targetNamespace: longhorn-system
  chart:
    spec:
      chart: longhorn
      version: "1.12.0"
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system

  # Longhorn Chart Settings
  # Default Data Path being set because we are using Talos and I want to make sure we're not clobbering other immutable things
  values:
    defaultSettings:
      defaultReplicaCount: 3
      defaultDataPath: /var/lib/longhorn
