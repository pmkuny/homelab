apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization

metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/cluster/main/apps
  prune: true
  # Make sure the platform layer is up and running first
  dependsOn:
    - name: platform
