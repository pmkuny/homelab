apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization

metadata:
  name: platform
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/clusters/main/platform
  prune: true
  # Depends on the underlying infrastrcture configuration (namespaces and other K8s primitives)
  dependsOn:
    - name: infrastructure
