apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization

metadata:
  name: infra-metallb-config
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/cluster/main/infrastructure/metallb/config
  prune: true
  dependsOn:
    - name: infra-metallb-controller
