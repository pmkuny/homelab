apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: adguard-home-pvc
  namespace: adguard-home
spec:
  accessModes:
    - ReadWriteOnce
    # longhorn-static is prebuilt by longhorn during install and is for stateful
  storageClassName: longhorn-static
  resources:
    requests:
      storage: 500Mi
