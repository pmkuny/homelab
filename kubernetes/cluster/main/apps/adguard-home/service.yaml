apiVersion: v1
kind: Service
metadata:
  name: adguard-home-svc
  namespace: adguard-home
  labels:
    lan_expose: true
    app: adguard-home
spec:
  type: LoadBalancer
  selector:
    app: adguard-home
  ports:
    - name: dns-udp
      port: 53
      targetPort: 53
      protocol: udp

    - name: dns-tcp
      port: 53
      targetPort: 53
      protocol: tcp

    - name: http
      port: 80
      targetPort: 80
      protocol: tcp

    - name: https
      port: 443
      targetPort: 443
      protocol: tcp

    - name: dns-tls
      port: 853
      targetPort: 853
      protocol: tcp
