apiVersion: v1
kind: Service
metadata:
  name: adguard-home-svc
  namespace: adguard-home
  labels:
    private: "true"
    app: adguard-home
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  selector:
    app: adguard-home
  ports:
    - name: dns-udp
      port: 53
      targetPort: 53
      protocol: UDP

    - name: dns-tcp
      port: 53
      targetPort: 53
      protocol: TCP

    - name: http
      port: 80
      targetPort: 80
      protocol: TCP

    - name: https
      port: 443
      targetPort: 443
      protocol: TCP

    - name: dns-tls
      port: 853
      targetPort: 853
      protocol: TCP
